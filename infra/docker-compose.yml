services:
  backend:
    build:
      context: ../nurvobackend
      dockerfile: Dockerfile
    container_name: nurvo-backend
    ports:
      - "8000:8000"
    env_file:
      - ../nurvobackend/.env
    restart: unless-stopped
    volumes:
      # Optional: Mount source code for hot-reloading in dev (if using uvicorn --reload)
      # - ./nurvobackend:/app
      - nurvo_data:/app/data

  frontend:
    build:
      context: ../nurvofronted
      dockerfile: Dockerfile
    container_name: nurvo-frontend
    ports:
      - "8080:80"  # Expose frontend on port 8080 on the host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nurvo_data:
